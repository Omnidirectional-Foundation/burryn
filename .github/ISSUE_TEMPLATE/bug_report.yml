name: Bug Report / 报告问题
description: Report a bug or unexpected behavior / 报告 bug 或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        感谢你花时间报告问题！

  - type: textarea
    id: description
    attributes:
      label: What happened? / 发生了什么？
      description: Describe the bug and what you expected to happen. / 描述 bug 以及你期望的行为。
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Minimal source / 最小复现源码
      description: The smallest `.bur` program that triggers the problem. / 触发问题的最小 `.bur` 程序。
      render: rust
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: How can we reproduce this? / 如何复现？
      placeholder: |
        1. Save the source as `repro.bur`
        2. Run `burc build repro.bur -o repro`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output / 日志或错误输出
      description: Paste any relevant logs, diagnostics, or error messages. / 粘贴相关日志、诊断或错误信息。
      render: shell

  - type: dropdown
    id: stage
    attributes:
      label: Affected stage / 出问题的阶段
      description: Where does the failure surface? / 故障出现在哪一环？
      options:
        - Lexer / 词法
        - Parser / 语法
        - Checker / types / 类型检查
        - Compiler / cgen (C backend) / 代码生成
        - VM / runtime / 运行时
        - Module system / 模块系统
        - Stdlib / natives / 标准库
        - Bootstrap / self-hosting / 自举
        - Other / 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: Which version or commit are you using? / 你使用的是哪个版本或 commit？
      placeholder: "v0.1 or commit hash"

  - type: dropdown
    id: os
    attributes:
      label: OS / 操作系统
      options:
        - Linux
        - macOS
        - Windows
        - Other / 其他

  - type: dropdown
    id: arch
    attributes:
      label: Architecture / 架构
      options:
        - amd64 (x86_64)
        - arm64 (aarch64)
        - arm (32-bit)
        - 386 (x86)
        - Other / 其他
