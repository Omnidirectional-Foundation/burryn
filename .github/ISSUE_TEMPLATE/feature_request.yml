name: Feature Request / 功能请求
description: Suggest a new feature or improvement / 建议新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!
        感谢你的建议！

        Language-level proposals should be weighed against the roadmap and
        design authority in [docs/GOALS.md](../../docs/GOALS.md).
        语言层面的提议请对照 [docs/GOALS.md](../../docs/GOALS.md) 中的路线图与设计权威来源权衡。

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve? / 你想解决什么问题？
      description: Describe the problem or use case. / 描述问题或使用场景。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / 建议的方案
      description: How would you like it to work? / 你希望它怎么工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 考虑过的替代方案
      description: Any alternative solutions you've considered? / 有没有考虑过其他方案？

  - type: textarea
    id: context
    attributes:
      label: Additional context / 补充信息
      description: Any other context, references, or GOALS.md sections. / 其他上下文、参考资料或 GOALS.md 章节。
