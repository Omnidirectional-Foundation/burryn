# Burryn is self-hosted: `main` contains zero Go, so Go's gofmt/vet/lint
# do not apply. CI instead proves the bootstrap rebirth chain end to end.
# Burryn 是自举的：`main` 上零 Go 代码，故 Go 的 gofmt/vet/lint 不适用。
# CI 改为端到端验证重新接生链。
#
# Chain / 流程 (three stages since the seed rebase / 定基后为三段):
#   archive/go-host (Go seed) --build--> bur-seed
#   bur-seed  build <seed-base-3>/burc -> bur-base (burc at the base tag)
#   bur-base  build burc      --------> gen1 (current burc)
#   gen1      build burc      --------> gen2 (second generation)
#   gen2      build burc      --------> gen3 (third generation)
#   cmp gen2 gen3 (byte-for-byte) ----> fixpoint reached
# The base tag's burc obeys the archived seed's old checker rules forever;
# burc after the base commit only needs to build under the base compiler.
# 基准 tag 的 burc 永久遵守归档种子的旧 checker 纪律；
# 基准之后的 burc 只需能被基准编译器构建。
# gen1 is compiled from C emitted by the frozen base cgen, so whenever the
# current cgen changes its emission, gen1 legitimately differs from gen2.
# gen1 and gen2 embed the same current compiler logic, so their emitted C
# must agree: the fixpoint judgment is gen2 == gen3.
# gen1 由冻结的基准 cgen 发射的 C 编成，当前 cgen 的发射一旦变化，
# gen1 与 gen2 合理地不同；gen1 与 gen2 内含同一份当前编译器逻辑，
# 二者发射的 C 必须一致：定点判定为 gen2 == gen3。
# If gen2 != gen3 the compiler is not a fixpoint and CI fails.
# 若 gen2 != gen3 则编译器未达定点，CI 失败。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The tagged base commit of the seed rebase (GOALS §6.5 S6.8).
  # 定基基准 commit 的 tag（GOALS §6.5 S6.8）。
  SEED_BASE_TAG: seed-base-4

jobs:
  bootstrap-fixpoint:
    runs-on: ubuntu-latest
    # #line emission grew program.c from ~6 MB to 10 MB; the chain now runs
    # ~20 min on a fast runner, so 30 left no margin for slow runners.
    timeout-minutes: 45
    steps:
      # main worktree: the self-hosted burc sources + runtime/ live here.
      # main 工作树：自举的 burc 源码与 runtime/ 都在这里。
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Build the Go seed from the archived host on a scratch worktree.
      # 在临时 worktree 上从归档宿主构建 Go 种子。
      - name: Build Go seed
        run: |
          git worktree add ../go-host archive/go-host
          # A stale program.c would break `go build` (C source not allowed).
          # 遗留的 program.c 会让 go build 报错（不允许 C 源文件）。
          rm -f ../go-host/program.c
          (cd ../go-host && go build -o "$GITHUB_WORKSPACE/bur-seed" .)

      # Seed compiles the base commit's burc. The base worktree is
      # self-contained: its own burc/, runtime/ and std/ are used.
      # 种子编译基准 commit 的 burc。基准 worktree 自含：
      # 用它自己的 burc/、runtime/ 与 std/。
      - name: Build base compiler (seed -> bur-base)
        run: |
          git worktree add ../seed-base "$SEED_BASE_TAG"
          rm -f ../seed-base/program.c
          (cd ../seed-base && "$GITHUB_WORKSPACE/bur-seed" build burc -o "$GITHUB_WORKSPACE/bur-base")
          test -x bur-base

      # bur-base compiles the current burc -> gen1. C is emitted to CWD as
      # program.c, so run from the main worktree root where runtime/ is
      # visible. / bur-base 编译当前 burc -> gen1。C 写到 CWD 的
      # program.c，故必须在能看到 runtime/ 的 main 工作树根运行。
      - name: Bootstrap gen1
        run: |
          rm -f program.c
          ./bur-base build burc -o gen1
          test -x gen1

      - name: Bootstrap gen2
        run: |
          rm -f program.c
          ./gen1 build burc -o gen2
          test -x gen2

      - name: Bootstrap gen3
        run: |
          rm -f program.c
          ./gen2 build burc -o gen3
          test -x gen3

      - name: Verify fixpoint (gen2 == gen3)
        run: |
          if ! cmp gen2 gen3; then
            echo "::error::bootstrap fixpoint broken: gen2 != gen3"
            exit 1
          fi
          echo "fixpoint reached: $(sha256sum gen2 | cut -d' ' -f1)"

      # The checked-in std embed table must equal a fresh regeneration from
      # the std/ sources. 内嵌 std 表必须与从 std/ 重新生成的结果逐字节一致。
      - name: Verify std embed is in sync
        run: |
          ./gen1 dev embed-std .
          git diff --exit-code burc/lib/std_embed.bur

      - name: Clean up
        if: always()
        run: |
          rm -f program.c
          git worktree remove --force ../go-host || true
          git worktree remove --force ../seed-base || true
