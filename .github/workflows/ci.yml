# Burryn is self-hosted: `main` contains zero Go, so Go's gofmt/vet/lint
# do not apply. CI proves the bootstrap rebirth chain end to end.
# Burryn 是自举的：`main` 上零 Go 代码，故 Go 的 gofmt/vet/lint 不适用。
# CI 端到端验证重新接生链。
#
# Three-job fan-out after gen1 (the single bottleneck):
# 三 job 扇出（gen1 为唯一瓶颈段）：
#
#   gen1:     [cache bur-base] -> bur-base build burc -> upload artifact
#   checks:   gen1 test + hover + std_embed  (needs: gen1)
#   fixpoint: gen2 -> gen3 -> cmp            (needs: gen1, parallel with checks)
#
# Chain / 流程 (three stages since the seed rebase / 定基后为三段):
#   archive/go-host (Go seed) --build--> bur-seed
#   bur-seed  build <seed-base-N>/burc -> bur-base (burc at the base tag)
#   bur-base  build burc      --------> gen1 (current burc)
#   gen1      build burc      --------> gen2 (second generation)
#   gen2      build burc      --------> gen3 (third generation)
#   cmp gen2 gen3 (byte-for-byte) ----> fixpoint reached
#
# gen1 is compiled from C emitted by the frozen base cgen, so whenever the
# current cgen changes its emission, gen1 legitimately differs from gen2.
# gen1 and gen2 embed the same current compiler logic, so their emitted C
# must agree: the fixpoint judgment is gen2 == gen3.
# gen1 由冻结的基准 cgen 发射的 C 编成，当前 cgen 的发射一旦变化，
# gen1 与 gen2 合理地不同；gen1 与 gen2 内含同一份当前编译器逻辑，
# 二者发射的 C 必须一致：定点判定为 gen2 == gen3。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SEED_BASE_TAG: seed-base-4

jobs:
  gen1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore bur-base from cache
        id: cache-bur-base
        uses: actions/cache@v4
        with:
          path: bur-base
          key: bur-base-${{ env.SEED_BASE_TAG }}-${{ runner.os }}

      - name: Set up Go
        if: steps.cache-bur-base.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build Go seed
        if: steps.cache-bur-base.outputs.cache-hit != 'true'
        run: |
          git worktree add ../go-host archive/go-host
          rm -f ../go-host/program.c
          (cd ../go-host && go build -o "$GITHUB_WORKSPACE/bur-seed" .)

      - name: Build base compiler (seed -> bur-base)
        if: steps.cache-bur-base.outputs.cache-hit != 'true'
        run: |
          git worktree add ../seed-base "$SEED_BASE_TAG"
          rm -f ../seed-base/program.c
          (cd ../seed-base && "$GITHUB_WORKSPACE/bur-seed" build burc -o "$GITHUB_WORKSPACE/bur-base")

      - name: Verify bur-base
        run: test -x bur-base

      - name: Bootstrap gen1
        run: |
          rm -f program.c
          ./bur-base build compiler -o gen1
          test -x gen1

      - name: Upload gen1
        uses: actions/upload-artifact@v4
        with:
          name: gen1
          path: gen1
          retention-days: 3

      - name: Clean up worktrees
        if: always()
        run: |
          rm -f program.c
          git worktree remove --force ../go-host 2>/dev/null || true
          git worktree remove --force ../seed-base 2>/dev/null || true

  checks:
    needs: gen1
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download gen1
        uses: actions/download-artifact@v4
        with:
          name: gen1

      - name: Make gen1 executable
        run: chmod +x gen1

      - name: Run tests
        run: ./gen1 test testdata/pkg/tested

      - name: Run hover query test
        run: |
          for off in 8 34; do
            out=$(./gen1 dev hover testdata/pkg/hovertest testdata/pkg/hovertest/h.bur "$off")
            if [ "$out" != "int" ]; then
              echo "::error::hover at offset $off returned '$out', expected 'int'"
              exit 1
            fi
          done

      - name: Verify std embed is in sync
        run: |
          ./gen1 dev embed-std .
          git diff --exit-code compiler/lib/std_embed.bur

  fixpoint:
    needs: gen1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download gen1
        uses: actions/download-artifact@v4
        with:
          name: gen1

      - name: Make gen1 executable
        run: chmod +x gen1

      - name: Bootstrap gen2
        run: |
          rm -f program.c
          ./gen1 build compiler -o gen2
          test -x gen2

      - name: Bootstrap gen3
        run: |
          rm -f program.c
          ./gen2 build compiler -o gen3
          test -x gen3

      - name: Verify fixpoint (gen2 == gen3)
        run: |
          if ! cmp gen2 gen3; then
            echo "::error::bootstrap fixpoint broken: gen2 != gen3"
            exit 1
          fi
          echo "fixpoint reached: $(sha256sum gen2 | cut -d' ' -f1)"

      - name: Upload gen3
        uses: actions/upload-artifact@v4
        with:
          name: gen3
          path: gen3
          retention-days: 3

      - name: Clean up
        if: always()
        run: rm -f program.c
